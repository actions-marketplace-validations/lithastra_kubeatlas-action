name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint action.yml, scripts, and example workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint on workflows and action.yml
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

      - name: shellcheck scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

  smoke:
    name: Smoke test against kind
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up kind cluster
        uses: helm/kind-action@v1

      - name: Apply a tiny fixture
        run: |
          kubectl create namespace demo
          kubectl create deployment hello -n demo --image=nginx:alpine
          kubectl rollout status deploy/hello -n demo --timeout=120s

      - name: Run the action against the kind cluster
        uses: ./
        with:
          version: latest
          scope: namespace:demo
          output: artifacts/demo.svg

      - name: Verify the SVG was produced
        run: |
          test -s artifacts/demo.svg
          head -c 200 artifacts/demo.svg | grep -q '<svg'

      - name: Upload SVG for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kubeatlas-demo-svg
          path: artifacts/demo.svg
          retention-days: 7
